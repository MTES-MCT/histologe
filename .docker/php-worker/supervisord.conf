[supervisord]
nodaemon=true

[program:messenger-consume]
command=php /app/bin/console messenger:consume async_priority_high async --time-limit=86400 -vv
user=root
numprocs=1
autostart=true
autorestart=true
process_name=%(program_name)s_%(process_num)02d

[program:scheduler]
command=php /app/bin/console messenger:consume scheduler_esabora --time-limit=86400 -vv
user=root
numprocs=1
autostart=true
autorestart=true
process_name=%(program_name)s_%(process_num)02d
