name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          sudo chmod a+r /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Build Docker containers
        run: docker compose build

      - name: Copy CI environment file
        run: cp .env.ci .env

      - name: Start Docker containers
        run: |
          docker compose down -v || true
          docker compose up -d --force-recreate

      - name: Wait for PHP container to be ready
        run: |
          docker compose exec -T signal_logement_phpfpm bash -c 'until php -v > /dev/null; do sleep 1; done'

      - name: Install PHP dependencies
        run: |
          docker compose exec -T signal_logement_phpfpm composer install --no-interaction --optimize-autoloader
          docker compose exec -T signal_logement_phpfpm composer require symfony/redis-messenger --no-interaction

      - name: Build frontend assets
        run: |
          docker compose exec -T signal_logement_phpfpm npm ci
          docker compose exec -T signal_logement_phpfpm npm run build

      - name: Cache clear & warmup
        run: |
          docker compose exec -T signal_logement_phpfpm php bin/console cache:clear --env=test --no-warmup
          docker compose exec -T signal_logement_phpfpm php bin/console cache:warmup --env=test

      - name: Init database
        run: |
          docker compose exec -T signal_logement_phpfpm php bin/console doctrine:database:drop --force --no-interaction || true
          docker compose exec -T signal_logement_phpfpm php bin/console doctrine:database:create --no-interaction
          docker compose exec -T signal_logement_phpfpm php bin/console messenger:setup-transports --no-interaction
          docker compose exec -T signal_logement_phpfpm php bin/console doctrine:migrations:migrate --no-interaction
          docker compose exec -T signal_logement_phpfpm php bin/console doctrine:fixtures:load --no-interaction

      - name: Wait for application to be ready
        run: |
          # Attendre que l'application soit accessible
          until curl -f http://localhost:8080/signalement > /dev/null 2>&1; do
            echo "Waiting for application to be ready..."
            sleep 5
          done
          echo "Application is ready!"

      - name: Install Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: tests/e2e
        run: npx playwright test

      - name: Switch to prod environment for Lighthouse
        run: |
          echo "APP_ENV=prod" > .env.local
          echo "APP_DEBUG=0" >> .env.local
          docker compose exec -T signal_logement_phpfpm php bin/console cache:clear --env=prod --no-warmup
          docker compose exec -T signal_logement_phpfpm php bin/console cache:warmup --env=prod

      - name: Wait for application in prod mode
        run: |
          max_attempts=30
          attempt=0
          until curl -f http://localhost:8080/connexion > /dev/null 2>&1; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "Application failed to start in prod mode after $max_attempts attempts"
              docker compose logs signal_logement_phpfpm --tail=50
              exit 1
            fi
            echo "Waiting for application to be ready in prod mode... (attempt $attempt/$max_attempts)"
            sleep 5
          done
          echo "Application is ready in prod mode!"

      - name: Run Lighthouse CI (public pages)
        run: |
          CHROME_PATH=$(npx playwright browsers path chromium)/chromium-*/chrome-linux/chrome
          export CHROME_PATH=$(ls $CHROME_PATH 2>/dev/null | head -1)
          npx lhci autorun --config=lighthouse/lighthouserc.json --chrome-flags="--no-sandbox --disable-dev-shm-usage"
        continue-on-error: true

      - name: Run Lighthouse CI (authenticated pages)
        run: |
          CHROME_PATH=$(npx playwright browsers path chromium)/chromium-*/chrome-linux/chrome
          export CHROME_PATH=$(ls $CHROME_PATH 2>/dev/null | head -1)
          npx lhci autorun --config=lighthouse/lighthouserc.auth.json --chrome-flags="--no-sandbox --disable-dev-shm-usage"
        continue-on-error: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/**/*.html
          if-no-files-found: warn

